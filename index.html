<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Quaker & Co.</title>
   <link rel="stylesheet" href="style.css">
   <script src="scripts.js"></script>
</head>
<body>
   <header class="navbar">
        <div class="navbar__container">
            <a href="#" class="navbar__brand">WebCorp</a>
            
            <button class="navbar__toggle" 
                    id="navbarToggle" 
                    aria-label="Toggle navigation" 
                    aria-controls="navbarMenu" 
                    aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            
            <nav id="navbarMenu" class="navbar__menu" role="navigation">
                <ul class="navbar__list">
                    <li class="navbar__item"><a href="#" class="navbar__link">About Us</a></li>
                    <li class="navbar__item"><a href="#" class="navbar__link">Quaker Ship Lines</a></li>
                    <li class="navbar__item"><a href="#" class="navbar__link">Quaker Roads</a></li>
                    <li class="navbar__item"><a href="#" class="navbar__link">The Colonial</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="content">
        <h1>Quaker & Co.</h1>
       <p>Accelerating colonial settling, transport, and information delivery since 1682.</p>
        
    </main>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const navbarToggle = document.getElementById('navbarToggle');
            const navbarMenu = document.getElementById('navbarMenu');

            if (navbarToggle && navbarMenu) {
                navbarToggle.addEventListener('click', function () {
                    navbarToggle.classList.toggle('is-active');
                    navbarMenu.classList.toggle('is-active');
                    
                    const isExpanded = navbarMenu.classList.contains('is-active');
                    navbarToggle.setAttribute('aria-expanded', isExpanded);
                });
            }
        });
    </script>
</body>
</html>
